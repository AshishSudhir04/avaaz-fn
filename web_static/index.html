<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avaaz – Gloss → Video Player</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #050816;
        color: #f9fafb;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      main {
        padding: 18px 20px 28px;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.85);
        border-radius: 14px;
        padding: 14px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 6px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(2, 6, 23, 0.75);
        color: #f9fafb;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
      }
      textarea {
        min-height: 70px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        color: #0b1220;
        background: linear-gradient(135deg, #38bdf8, #22c55e);
      }
      button.secondary {
        color: #e5e7eb;
        background: rgba(2, 6, 23, 0.35);
        border: 1px solid rgba(148, 163, 184, 0.35);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 12px;
        color: #cbd5e1;
      }
      video {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: #020617;
      }
      .pill {
        font-size: 12px;
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(2, 6, 23, 0.5);
        padding: 6px 10px;
        border-radius: 999px;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <strong>Avaaz</strong>
        <span style="color: #94a3b8; font-size: 12px; margin-left: 6px"
          >ISL gloss → video sequence (MVP)</span
        >
      </div>
      <span class="pill" id="status">Idle</span>
    </header>

    <main>
      <section class="card">
        <div style="display: grid; gap: 12px">
          <div>
            <label>English text (optional)</label>
            <textarea
              id="english"
              placeholder="Example: What is your name?"
            ></textarea>
          </div>

          <div>
            <label>Gloss tokens (space-separated)</label>
            <textarea
              id="gloss"
              placeholder="Example: YOUR NAME WHAT"
            ></textarea>
          </div>

          <div class="row">
            <button id="btnGlossPlay">Gloss + Play</button>
            <button id="btnPlay" class="secondary">Play Gloss</button>
            <button id="btnLive" class="secondary">Live: Start</button>
            <button id="btnStop" class="secondary">Stop</button>
          </div>
        </div>
      </section>

      <section class="card">
        <video id="player" controls></video>
        <div style="height: 10px"></div>
        <label>Output</label>
        <pre id="out">Ready.</pre>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const englishEl = document.getElementById("english");
      const glossEl = document.getElementById("gloss");
      const outEl = document.getElementById("out");
      const player = document.getElementById("player");
      const btnGlossPlay = document.getElementById("btnGlossPlay");
      const btnPlay = document.getElementById("btnPlay");
      const btnLive = document.getElementById("btnLive");
      const btnStop = document.getElementById("btnStop");

      let queue = [];
      let queueIdx = 0;
      let liveTimer = null;
      let lastEventId = 0;

      function setStatus(s) {
        statusEl.textContent = s;
      }

      function log(obj) {
        outEl.textContent =
          (typeof obj === "string" ? obj : JSON.stringify(obj, null, 2)) +
          "\n\n" +
          outEl.textContent;
      }

      function tokenizeGloss(s) {
        return s
          .split(/\s+/)
          .map((t) => t.trim())
          .filter(Boolean)
          .map((t) => t.toUpperCase());
      }

      async function fetchGloss(text) {
        const res = await fetch("/api/gloss", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error("Failed /api/gloss");
        return await res.json();
      }

      async function fetchSequence(glossTokens) {
        const res = await fetch("/api/sequence", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gloss_tokens: glossTokens }),
        });
        if (!res.ok) throw new Error("Failed /api/sequence");
        return await res.json();
      }

      async function fetchLatest() {
        const res = await fetch("/api/latest");
        if (!res.ok) throw new Error("Failed /api/latest");
        return await res.json();
      }

      function playQueue(urls) {
        queue = urls;
        queueIdx = 0;
        if (!queue.length) {
          setStatus("No videos");
          return;
        }
        setStatus("Playing…");
        player.src = queue[0];
        player.play().catch(() => {});
      }

      player.addEventListener("ended", () => {
        if (!queue.length) return;
        queueIdx += 1;
        if (queueIdx >= queue.length) {
          setStatus("Done");
          return;
        }
        player.src = queue[queueIdx];
        player.play().catch(() => {});
      });

      btnStop.addEventListener("click", () => {
        queue = [];
        queueIdx = 0;
        player.pause();
        player.removeAttribute("src");
        player.load();
        setStatus("Stopped");
      });

      btnLive.addEventListener("click", async () => {
        if (liveTimer) {
          clearInterval(liveTimer);
          liveTimer = null;
          btnLive.textContent = "Live: Start";
          setStatus("Live stopped");
          return;
        }

        btnLive.textContent = "Live: Stop";
        setStatus("Live polling…");

        liveTimer = setInterval(async () => {
          try {
            const latest = await fetchLatest();
            const id = latest.id || 0;
            if (!id || id === lastEventId) return;
            lastEventId = id;

            if (latest.transcript) englishEl.value = latest.transcript;
            if (Array.isArray(latest.gloss_tokens)) {
              glossEl.value = latest.gloss_tokens.join(" ");
            }
            log({ live_event: latest });

            if (latest.missing?.length) {
              log({ warning: "Missing tokens", missing: latest.missing });
            }

            playQueue(latest.video_urls || []);
          } catch (e) {
            setStatus("Live error");
            log(String(e));
          }
        }, 700);
      });

      btnPlay.addEventListener("click", async () => {
        try {
          setStatus("Mapping…");
          const glossTokens = tokenizeGloss(glossEl.value);
          const seq = await fetchSequence(glossTokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          playQueue(seq.video_urls || []);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      btnGlossPlay.addEventListener("click", async () => {
        try {
          const text = englishEl.value.trim();
          if (!text) {
            log("Enter English text first, or use Play Gloss.");
            return;
          }
          setStatus("Glossing…");
          const gloss = await fetchGloss(text);
          log(gloss);
          const tokens = gloss.gloss_tokens || [];
          glossEl.value = tokens.join(" ");
          setStatus("Mapping…");
          const seq = await fetchSequence(tokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          playQueue(seq.video_urls || []);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      // Quick sanity check
      fetch("/health")
        .then((r) => r.json())
        .then((j) => log({ health: j }))
        .catch(() => {});
    </script>
  </body>
</html>
