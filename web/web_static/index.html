<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avaaz – Gloss → Video Player</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --card: #121a2e;
        --card-border: #24304a;
        --text: #e5e7eb;
        --text-dim: #94a3b8;
        --line: #2f3b57;
        --accent: #38bdf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--card-border);
        border-radius: 10px;
        background: var(--card);
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .brand-title {
        font-weight: 700;
      }
      .brand-subtitle {
        color: var(--text-dim);
        font-size: 12px;
      }
      main {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 0.95fr);
        gap: 12px;
      }
      .card {
        border: 1px solid var(--card-border);
        background: var(--card);
        border-radius: 10px;
        padding: 14px;
      }
      .card-title {
        margin: 0 0 10px;
        font-size: 13px;
        color: #cbd5e1;
        font-weight: 600;
      }
      .stack {
        display: grid;
        gap: 10px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0a1325;
        color: var(--text);
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
        min-height: 74px;
        resize: vertical;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 9px 13px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        color: #041219;
        background: var(--accent);
      }
      button.secondary {
        color: #e5e7eb;
        background: #0d1528;
        border: 1px solid var(--line);
      }
      .pill {
        font-size: 12px;
        color: #dbeafe;
        border: 1px solid var(--line);
        background: #0d1528;
        padding: 6px 10px;
        border-radius: 999px;
      }
      .player-wrap {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #060b18;
      }
      video {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: #cbd5e1;
        max-height: 280px;
        overflow: auto;
        border: 1px solid var(--line);
        background: #0a1325;
        border-radius: 8px;
        padding: 10px;
      }
      @media (max-width: 980px) {
        .shell {
          padding: 12px;
        }
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <div class="brand-title">Avaaz</div>
          <div class="brand-subtitle">ISL gloss to video sequence</div>
        </div>
        <span class="pill" id="status">Idle</span>
      </header>

      <main>
        <section class="card">
          <h2 class="card-title">Input & Controls</h2>
          <div class="stack">
            <div>
              <label>English text (optional)</label>
              <textarea
                id="english"
                placeholder="Example: What is your name?"
              ></textarea>
            </div>

            <div>
              <label>Gloss tokens (space-separated)</label>
              <textarea
                id="gloss"
                placeholder="Example: YOUR NAME WHAT"
              ></textarea>
            </div>

            <div class="row">
              <button id="btnGlossPlay">Gloss + Play</button>
              <button id="btnPlay" class="secondary">Play Gloss</button>
              <button id="btnLive" class="secondary">Live: Start</button>
              <button id="btnStop" class="secondary">Stop</button>
            </div>
          </div>
        </section>

        <section class="card">
          <h2 class="card-title">Player & Event Log</h2>
          <div class="player-wrap">
            <video id="player" controls></video>
          </div>
          <div style="height: 12px"></div>
          <label>Output</label>
          <pre id="out">Ready.</pre>
        </section>
      </main>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const englishEl = document.getElementById("english");
      const glossEl = document.getElementById("gloss");
      const outEl = document.getElementById("out");
      const player = document.getElementById("player");
      const btnGlossPlay = document.getElementById("btnGlossPlay");
      const btnPlay = document.getElementById("btnPlay");
      const btnLive = document.getElementById("btnLive");
      const btnStop = document.getElementById("btnStop");

      let queue = [];
      let queueIdx = 0;
      let liveTimer = null;
      let lastEventId = 0;

      function setStatus(s) {
        statusEl.textContent = s;
      }

      function log(obj) {
        outEl.textContent =
          (typeof obj === "string" ? obj : JSON.stringify(obj, null, 2)) +
          "\n\n" +
          outEl.textContent;
      }

      function tokenizeGloss(s) {
        return s
          .split(/\s+/)
          .map((t) => t.trim())
          .filter(Boolean)
          .map((t) => t.toUpperCase());
      }

      function letterFallbackUrls(tokens) {
        const urls = [];
        for (const raw of tokens || []) {
          const token = String(raw || "").trim().toUpperCase();
          // Only fingerspell unknown alphabetic words (names/places).
          if (!/^[A-Z]{2,}$/.test(token)) continue;
          for (const ch of token) {
            urls.push(`/videos/${encodeURIComponent(ch + ".mp4")}`);
          }
        }
        return urls;
      }

      async function fetchGloss(text) {
        const res = await fetch("/api/gloss", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error("Failed /api/gloss");
        return await res.json();
      }

      async function fetchSequence(glossTokens) {
        const res = await fetch("/api/sequence", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gloss_tokens: glossTokens }),
        });
        if (!res.ok) throw new Error("Failed /api/sequence");
        return await res.json();
      }

      async function fetchLatest() {
        const res = await fetch("/api/latest");
        if (!res.ok) throw new Error("Failed /api/latest");
        return await res.json();
      }

      async function primeLiveBaseline() {
        // Avoid replaying the last stored event when Live starts/restarts.
        try {
          const latest = await fetchLatest();
          lastEventId = latest.id || 0;
        } catch {
          // If server is temporarily unavailable, keep existing baseline.
        }
      }

      function playQueue(urls) {
        queue = urls;
        queueIdx = 0;
        if (!queue.length) {
          setStatus("No videos");
          return;
        }
        setStatus("Playing…");
        player.src = queue[0];
        player.play().catch(() => {});
      }

      player.addEventListener("ended", () => {
        if (!queue.length) return;
        queueIdx += 1;
        if (queueIdx >= queue.length) {
          setStatus("Done");
          return;
        }
        player.src = queue[queueIdx];
        player.play().catch(() => {});
      });

      async function stopAsrEngine() {
        try {
          await fetch("/api/asr_control", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ state: "stopped" }),
          });
        } catch {
          // If control endpoint is unavailable, just ignore – UI still stops playback.
        }
      }

      btnStop.addEventListener("click", () => {
        queue = [];
        queueIdx = 0;
        player.pause();
        player.removeAttribute("src");
        player.load();

        // Also stop live polling if it's running
        if (liveTimer) {
          clearInterval(liveTimer);
          liveTimer = null;
        }
        btnLive.textContent = "Live: Start";

        stopAsrEngine();
        setStatus("Stopped");
      });

      btnLive.addEventListener("click", async () => {
        if (liveTimer) {
          clearInterval(liveTimer);
          liveTimer = null;
          btnLive.textContent = "Live: Start";
          setStatus("Live stopped");
          // Also ask backend ASR engine to stop after current utterance.
          stopAsrEngine();
          return;
        }

        btnLive.textContent = "Live: Stop";
        setStatus("Live polling…");
        await primeLiveBaseline();

        liveTimer = setInterval(async () => {
          try {
            const latest = await fetchLatest();
            const id = latest.id || 0;
            if (!id || id === lastEventId) return;
            lastEventId = id;

            if (latest.transcript) englishEl.value = latest.transcript;
            if (Array.isArray(latest.gloss_tokens)) {
              glossEl.value = latest.gloss_tokens.join(" ");
            }
            log({ live_event: latest });

            if (latest.missing?.length) {
              log({ warning: "Missing tokens", missing: latest.missing });
            }

            const fallback = letterFallbackUrls(latest.missing || []);
            playQueue([...(latest.video_urls || []), ...fallback]);
          } catch (e) {
            setStatus("Live error");
            log(String(e));
          }
        }, 700);
      });

      btnPlay.addEventListener("click", async () => {
        try {
          setStatus("Mapping…");
          const glossTokens = tokenizeGloss(glossEl.value);
          const seq = await fetchSequence(glossTokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          const fallback = letterFallbackUrls(seq.missing || []);
          playQueue([...(seq.video_urls || []), ...fallback]);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      btnGlossPlay.addEventListener("click", async () => {
        try {
          const text = englishEl.value.trim();
          if (!text) {
            log("Enter English text first, or use Play Gloss.");
            return;
          }
          setStatus("Glossing…");
          const gloss = await fetchGloss(text);
          log(gloss);
          const tokens = gloss.gloss_tokens || [];
          glossEl.value = tokens.join(" ");
          setStatus("Mapping…");
          const seq = await fetchSequence(tokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          const fallback = letterFallbackUrls(seq.missing || []);
          playQueue([...(seq.video_urls || []), ...fallback]);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      // Quick sanity check
      fetch("/health")
        .then((r) => r.json())
        .then((j) => log({ health: j }))
        .catch(() => {});
    </script>
  </body>
</html>
